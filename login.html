<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://kit.fontawesome.com/64d58efce2.js" crossorigin="anonymous"></script>

<link rel="stylesheet" href="style.css" />

<title>Sign in & Sign up Form</title>

</head>

<body>

<div class="container">

<div class="forms-container">

<div class="signin-signup">


<form action="#" class="sign-in-form" id="loginForm">

<h2 class="title">Sign in</h2>

<div class="input-field">
<i class="fas fa-envelope"></i>
<input type="email" id="loginEmail" placeholder="Email" required />
</div>

<div class="input-field">
<i class="fas fa-lock"></i>
<input type="password" id="loginPassword" placeholder="Password" required />
</div>

<input type="submit" value="Login" class="btn solid" />

<p class="social-text">Or Sign in with social platforms</p>

<div class="social-media">
<a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
<a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
<a href="#" class="social-icon"><i class="fab fa-google"></i></a>
<a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
</div>

</form>



<form action="#" class="sign-up-form" id="signupForm">

<h2 class="title">Sign up</h2>

<div class="input-field">
<i class="fas fa-user"></i>
<input type="text" id="signupUsername" placeholder="Username" />
</div>

<div class="input-field">
<i class="fas fa-envelope"></i>
<input type="email" id="signupEmail" placeholder="Email" required />
</div>

<div class="input-field">
<i class="fas fa-lock"></i>
<input type="password" id="signupPassword" placeholder="Password" required />
</div>

<input type="submit" class="btn" value="Sign up" />

<p class="social-text">Or Sign up with social platforms</p>

<div class="social-media">
<a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
<a href="#" class="social-icon"><i class="fab fa-twitter"></i></a>
<a href="#" class="social-icon"><i class="fab fa-google"></i></a>
<a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
</div>

</form>

</div>
</div>



<div class="panels-container">

<div class="panel left-panel">
<div class="content">
<h3>Finglobe CRM</h3>

<p>
Seamlessly access your account or join our community for exclusive benefits! 🚀
</p>

<button class="btn transparent" id="sign-up-btn">
Sign up
</button>

</div>

<img src="https://i.ibb.co/6HXL6q1/Privacy-policy-rafiki.png" class="image" alt="" />

</div>



<div class="panel right-panel">

<div class="content">

<h3>Finglobe CRM</h3>

<p>
Thank you for being part of our community. Let's continue this journey together!
</p>

<button class="btn transparent" id="sign-in-btn">
Sign in
</button>

</div>

<img src="https://i.ibb.co/nP8H853/Mobile-login-rafiki.png" class="image" alt="" />

</div>

</div>

</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="main.js"></script>

</body>
</html>
