<!DOCTYPE html>
<html>
<head>
<title>My Leads</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#0b1d3a;color:white;padding:20px;}
table{width:100%;margin-top:20px;background:#10264a;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid rgba(255,255,255,0.1);}
button{padding:6px 10px;border:none;border-radius:5px;margin:2px;cursor:pointer;}
select{padding:5px;border-radius:5px;background:#0b1d3a;color:white;}
.call{background:#4ea3ff;}
.whatsapp{background:#25D366;}
.mail{background:#ff9f43;}
.debug{background:#222;padding:10px;margin-top:10px;font-size:12px;}
</style>

</head>

<body>

<h2>My Leads</h2>

<button onclick="logout()">Logout</button>

<div id="debug" class="debug"></div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://npyijrvbscsgmgkvnezh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5weWlqcnZic2NzZ21na3ZuZXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTE1MjEsImV4cCI6MjA4ODk2NzUyMX0.wlQ11YfULBxho_L1mFRqc3p8F88rMidsysnUeiRhqHI"
)

// GET USER
let user = JSON.parse(localStorage.getItem("telecaller"))

// DEBUG PANEL
function debug(msg){
document.getElementById("debug").innerText += msg + "\n"
console.log(msg)
}

// CHECK USER
debug("User: " + JSON.stringify(user))

if(!user){
alert("Login required")
window.location.href="login.html"
}

// FETCH LEADS
async function fetchLeads(){

debug("Fetching leads...")

// 🔥 STEP 1: GET ALL LEADS
const { data, error } = await supabaseClient
.from("leads")
.select("*")

debug("Error: " + JSON.stringify(error))
debug("Total Leads: " + (data ? data.length : 0))

if(error){
alert("Error: " + error.message)
return
}

// 🔥 STEP 2: FILTER MANUALLY
let myLeads = (data || []).filter(l => l.assigned_to == user.id)

debug("User ID: " + user.id)
debug("My Leads Count: " + myLeads.length)

// 🔥 FALLBACK (if nothing found)
if(myLeads.length === 0){
debug("⚠ No assigned leads → showing ALL leads (debug mode)")
myLeads = data
}

render(myLeads)

}

// RENDER
function render(leads){

if(!leads || leads.length === 0){
table.innerHTML = `<tr><td colspan="6">No leads found</td></tr>`
return
}

table.innerHTML = leads.map(l=>`
<tr>
<td>${l.name}</td>
<td>${l.phone}</td>
<td>${l.city || ""}</td>
<td>${l.email || ""}</td>

<td>
<select onchange="updateStatus(${l.id}, this.value)">
<option ${l.status==="New"?"selected":""}>New</option>
<option ${l.status==="Interested"?"selected":""}>Interested</option>
<option ${l.status==="Follow Up"?"selected":""}>Follow Up</option>
<option ${l.status==="Converted"?"selected":""}>Converted</option>
<option ${l.status==="Not Interested"?"selected":""}>Not Interested</option>
</select>
</td>

<td>
<button class="call" onclick="call('${l.phone}')">Call</button>
<button class="whatsapp" onclick="whatsapp('${l.phone}')">WhatsApp</button>
<button class="mail" onclick="sendMail('${l.email}')">Mail</button>
</td>

</tr>
`).join("")

}

// UPDATE STATUS
async function updateStatus(id, status){

const { error } = await supabaseClient
.from("leads")
.update({ status: status })
.eq("id", id)

if(error){
alert(error.message)
}else{
fetchLeads()
}

}

// CALL
function call(phone){
window.location.href="tel:"+phone
}

// WHATSAPP
function whatsapp(phone){
let msg = encodeURIComponent("Hello, I am calling regarding your enquiry.")
window.open(`https://wa.me/91${phone}?text=${msg}`, "_blank")
}

// EMAIL
function sendMail(email){
window.location.href=`mailto:${email}?subject=Regarding your enquiry`
}

// LOGOUT
function logout(){
localStorage.removeItem("telecaller")
window.location.href="login.html"
}

// START
fetchLeads()

</script>

</body>
</html>
