<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finglobe Telecalling CRM</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#0b1d3a;
color:white;
}

header{
padding:20px;
background:#081633;
}

.container{
padding:20px;
}

input,select{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
padding:7px 12px;
border:none;
border-radius:5px;
cursor:pointer;
margin-right:5px;
}

.add{background:#28c76f;color:white;}
.call{background:#4ea3ff;color:white;}
.view{background:#7367f0;color:white;}
.delete{background:#ea5455;color:white;}
.upload{background:#00cfe8;color:white;}

.error{
background:#ea5455;
padding:10px;
margin:10px 0;
border-radius:5px;
display:none;
}

.success{
background:#28c76f;
padding:10px;
margin:10px 0;
border-radius:5px;
display:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#10264a;
}

th,td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.status-select{
background:#0b1d3a;
color:white;
}

</style>

</head>

<body>

<header>
<h2>Finglobe Telecalling CRM</h2>
</header>

<div class="container">

<div id="errorBox" class="error"></div>
<div id="successBox" class="success"></div>

<h3>Add Lead</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<input id="email" placeholder="Email">

<select id="status">
<option>New</option>
<option>Interested</option>
<option>Follow Up</option>
<option>Converted</option>
<option>Not Interested</option>
</select>

<button class="add" onclick="addLead()">Add Lead</button>


<h3>Upload Excel Leads</h3>

<input type="file" id="excelFile" accept=".xlsx,.xls">
<button class="upload" onclick="uploadExcel()">Upload Excel</button>


<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Email</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="leadTable"></tbody>

</table>

</div>


<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://npyijrvbscsgmgkvnezh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5weWlqcnZic2NzZ21na3ZuZXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTE1MjEsImV4cCI6MjA4ODk2NzUyMX0.wlQ11YfULBxho_L1mFRqc3p8F88rMidsysnUeiRhqHI"
)

let leads=[]


// ✅ UI Messages
function showError(msg){
errorBox.innerText=msg
errorBox.style.display="block"
setTimeout(()=>errorBox.style.display="none",4000)
}

function showSuccess(msg){
successBox.innerText=msg
successBox.style.display="block"
setTimeout(()=>successBox.style.display="none",4000)
}


// ✅ Fetch Leads
async function fetchLeads(){

const { data, error } = await supabaseClient
.from("leads")
.select("*")
.order("id",{ascending:false})

if(error){
showError(error.message)
return
}

leads=data
renderLeads()

}


// ✅ Render Table WITH DROPDOWN EDIT 🔥
function renderLeads(){

let table=""

leads.forEach((lead)=>{

table+=`
<tr>
<td>${lead.name}</td>
<td>${lead.phone}</td>
<td>${lead.city}</td>
<td>${lead.email || ""}</td>

<td>
<select class="status-select" onchange="updateStatus(${lead.id}, this.value)">
<option ${lead.status==="New"?"selected":""}>New</option>
<option ${lead.status==="Interested"?"selected":""}>Interested</option>
<option ${lead.status==="Follow Up"?"selected":""}>Follow Up</option>
<option ${lead.status==="Converted"?"selected":""}>Converted</option>
<option ${lead.status==="Not Interested"?"selected":""}>Not Interested</option>
</select>
</td>

<td>
<button class="call" onclick="callLead('${lead.phone}')">Call</button>
<button class="view" onclick="viewLead(${lead.id})">View</button>
<button class="delete" onclick="deleteLead(${lead.id})">Delete</button>
</td>
</tr>
`

})

document.getElementById("leadTable").innerHTML=table

}


// ✅ Update Status (NO PROMPT)
async function updateStatus(id, newStatus){

const { error } = await supabaseClient
.from("leads")
.update({ status: newStatus })
.eq("id", id)

if(error){
showError(error.message)
}else{
showSuccess("Status Updated")
fetchLeads()
}

}


// ✅ Add Lead
async function addLead(){

let name=nameInput.value
let phone=phoneInput.value.replace(/[^0-9]/g,"")

if(!name || !phone){
showError("Enter name and phone")
return
}

const { error } = await supabaseClient
.from("leads")
.insert([{
name,
phone,
city:cityInput.value,
email:emailInput.value,
status:status.value
}])

if(error){
showError(error.message)
}else{
showSuccess("Lead Added")
fetchLeads()
}

nameInput.value=""
phoneInput.value=""
cityInput.value=""
emailInput.value=""

}


// ✅ Call
function callLead(phone){
window.location.href="tel:"+phone
}


// ✅ View
function viewLead(id){

let lead = leads.find(l => l.id == id)

alert(
"Name: "+lead.name+"\n"+
"Phone: "+lead.phone+"\n"+
"City: "+lead.city+"\n"+
"Email: "+(lead.email || "")+"\n"+
"Status: "+lead.status
)

}


// ✅ Delete
async function deleteLead(id){

if(!confirm("Delete this lead?")) return

const { error } = await supabaseClient
.from("leads")
.delete()
.eq("id",id)

if(error){
showError(error.message)
}else{
showSuccess("Deleted")
fetchLeads()
}

}


// ✅ Excel Upload
async function uploadExcel(){

const fileInput=document.getElementById("excelFile")

if(fileInput.files.length===0){
showError("Select Excel file")
return
}

const file=fileInput.files[0]

const reader=new FileReader()

reader.onload=async function(e){

const data=new Uint8Array(e.target.result)

const workbook=XLSX.read(data,{type:'array'})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const jsonData=XLSX.utils.sheet_to_json(sheet)

let leadsToInsert=[]

jsonData.forEach(row => {

leadsToInsert.push({
name: row["Name"] || "",
phone: (row["Mobile No."] || "").toString().replace(/[^0-9]/g,""),
city: row["Current Location"] || "",
email: row["Email Id"] || "",
status: "New"
})

})

const { error } = await supabaseClient
.from("leads")
.insert(leadsToInsert)

if(error){
showError(error.message)
}else{
showSuccess("Excel Uploaded Successfully")
fetchLeads()
}

}

reader.readAsArrayBuffer(file)

}


// 🚀 Start
fetchLeads()

</script>

</body>
</html>
