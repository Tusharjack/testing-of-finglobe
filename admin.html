<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finglobe CRM Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#0b1d3a;
color:white;
margin:0;
}
header{
padding:15px;
background:#081633;
}
.container{
padding:20px;
}
input,button{
margin:5px;
padding:8px;
border-radius:5px;
border:none;
}
button{cursor:pointer;}
table{
width:100%;
margin-top:20px;
background:#10264a;
border-collapse:collapse;
}
td,th{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body>

<header>
<h2>Finglobe CRM Admin Dashboard</h2>
</header>

<div class="container">

<button onclick="window.location.href='telecallers.html'">
Manage Telecallers
</button>

<h3>Add Lead</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">
<input id="email" placeholder="Email">

<button onclick="addLead()">Add Lead</button>

<h3>Upload Excel</h3>

<input type="file" id="excelFile">
<button onclick="uploadExcel()">Upload Excel</button>

<br><br>

<button onclick="sortByStatus()">Sort by Status</button>
<button onclick="sortByTelecaller()">Sort by Telecaller</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>City</th>
<th>Email</th>
<th>Status</th>
<th>Telecaller</th>
</tr>
</thead>

<tbody id="leadTable"></tbody>

</table>

</div>

<script>

const { createClient } = supabase

const supabaseClient = createClient(
"https://npyijrvbscsgmgkvnezh.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5weWlqcnZic2NzZ21na3ZuZXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTE1MjEsImV4cCI6MjA4ODk2NzUyMX0.wlQ11YfULBxho_L1mFRqc3p8F88rMidsysnUeiRhqHI"
)

let leads=[]
let telecallers=[]

// LOAD TELECALLERS
async function loadTelecallers(){

const { data, error } = await supabaseClient
.from("telecallers")
.select("*")

console.log("Telecallers:", data)

if(error){
console.log("Telecaller Error:", error)
}

telecallers = data || []

}

// FETCH LEADS
async function fetchLeads(){

await loadTelecallers()

const { data, error } = await supabaseClient
.from("leads")
.select("*")

console.log("Leads:", data)

if(error){
console.log("Leads Error:", error)
return
}

leads=data || []
render()

}

// GET TELECALLER NAME
function getTelecallerName(id){
let tc = telecallers.find(t => t.id == id)
return tc ? tc.name : "Unassigned"
}

// RENDER TABLE
function render(){

let html=""

leads.forEach(l=>{

html+=`
<tr>
<td>${l.name}</td>
<td>${l.phone}</td>
<td>${l.city || ""}</td>
<td>${l.email || ""}</td>
<td>${l.status}</td>
<td>${getTelecallerName(l.assigned_to)}</td>
</tr>
`

})

document.getElementById("leadTable").innerHTML=html

}

// SORT BY STATUS
function sortByStatus(){
leads.sort((a,b)=> (a.status || "").localeCompare(b.status || ""))
render()
}

// SORT BY TELECALLER
function sortByTelecaller(){
leads.sort((a,b)=>{
return getTelecallerName(a.assigned_to)
.localeCompare(getTelecallerName(b.assigned_to))
})
render()
}

// ADD LEAD
async function addLead(){

await loadTelecallers()

if(telecallers.length===0){
alert("No telecallers found")
return
}

let assigned = telecallers[leads.length % telecallers.length].id

const { error } = await supabaseClient.from("leads").insert([{
name:name.value,
phone:phone.value,
city:city.value,
email:email.value,
status:"New",
assigned_to:assigned
}])

if(error){
console.log(error)
alert(error.message)
}else{
alert("Lead Added")
fetchLeads()
}

}

// UPLOAD EXCEL WITH STATUS FIX
async function uploadExcel(){

console.log("UPLOAD CLICKED")

await loadTelecallers()

if(telecallers.length===0){
alert("Add telecallers first")
return
}

let file=document.getElementById("excelFile").files[0]

if(!file){
alert("Select file")
return
}

let reader=new FileReader()

reader.onload=async function(e){

try{

let data=new Uint8Array(e.target.result)
let wb=XLSX.read(data,{type:"array"})
let sheet=wb.Sheets[wb.SheetNames[0]]
let json=XLSX.utils.sheet_to_json(sheet)

console.log("Excel Data:", json)

let list=[]
let i=0

json.forEach(row=>{

console.log("Row Status:", row["Status"])

let assigned = telecallers[i % telecallers.length].id
i++

list.push({
name: row["Name"] || "",
phone: (row["Mobile No."] || "").toString(),
city: row["Current Location"] || "",
email: row["Email Id"] || "",

// 🔥 FIXED STATUS
status: (row["Status"] || "New").toString().trim(),

assigned_to: assigned
})

})

console.log("Final Insert List:", list)

const { error } = await supabaseClient
.from("leads")
.insert(list)

if(error){
console.log("Insert Error:", error)
alert(error.message)
}else{
alert("Excel Uploaded & Distributed Successfully")
fetchLeads()
}

}catch(err){
console.log("Processing Error:", err)
alert("Error reading Excel")
}

}

reader.readAsArrayBuffer(file)

}

// START
fetchLeads()

</script>

</body>
</html>
